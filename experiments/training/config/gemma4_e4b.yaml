model_id: google/gemma-4-e4b-it
task: instruction_tuning
# 4096 cobre prompt compacto (203 tok) + texto truncado (2200 chars ~ 550 tok) +
# resposta SOAP p95 (3300 tok) com folga. Se OOM durante eval, baixar para 3584.
max_seq_length: 4096
gradient_checkpointing: true
eval_accumulation_steps: 4
num_train_epochs: 3
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
lr_scheduler: cosine
warmup_ratio: 0.03
optim: adamw_torch
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  # As towers vision/audio são deletadas no script train_gemma4_e4b.py, então
  # target_modules padrão agora casa só com language_model (Linear puro).
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  bias: none
  task_type: CAUSAL_LM
seed: 42
output_dir: checkpoints/gemma4_e4b/
data_dir: data/gemma_format/
log_dir: logs/
